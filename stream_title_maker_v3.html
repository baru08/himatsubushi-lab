const baitPrefixes = [
  "【絶対見て】","【まさかの神回】","【ガチでやばい】","【閲覧注意】","【伝説回】",
  "【緊急】","【事故寸前】","【衝撃展開】","【これはひどい】","【完全に終わった】",
  "【奇跡が起きた】","【初見さん歓迎】","【本気です】","【今日だけ】","【助けて】"
];

const baitOpeners = [
  "とんでもないことになった",
  "配信者人生で一番焦った",
  "今日は本当に終われない",
  "これ、普通に神回では？",
  "コメント欄がざわついた",
  "予想外すぎて固まった",
  "ここから伝説が始まる",
  "さすがにこれは見てほしい",
  "完全にフラグ回収しました",
  "もう後戻りできません"
];

function makeBaitTitle(base){
  const pattern = Math.floor(Math.random()*4);
  if(pattern === 0) return pick(baitPrefixes) + " " + base;
  if(pattern === 1) return pick(baitPrefixes) + " " + pick(baitOpeners) + "｜" + base;
  if(pattern === 2) return pick(baitOpeners) + "ので見届けてください｜" + base;
  return pick(baitPrefixes) + " " + base + "【最後まで見て】";
}

let currentTitles = [];
let currentTags = "";

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getPool(key){
  if(key !== "random") return {label:genres[key].label, tags:genres[key].tags, titles:genres[key].titles};
  const allTitles = [];
  const tagSet = new Set(["#VTuber","#配信"]);
  Object.values(genres).forEach(g=>{
    allTitles.push(...g.titles.map(t=>({title:t,label:g.label})));
    g.tags.forEach(tag=>tagSet.add(tag));
  });
  return {label:"全部ランダム", tags:[...tagSet].slice(0,5), titles:allTitles};
}

function generate(){
  const genreKey = document.getElementById("genre").value;
  const bait = document.getElementById("bait").checked;
  const pool = getPool(genreKey);
  const unique = new Set();
  const results = [];

  if(genreKey === "random"){
    const shuffled = shuffle(pool.titles);
    for(const item of shuffled){
      let title = item.title;
      if(bait) title = makeBaitTitle(title);
      if(!unique.has(title)){
        unique.add(title);
        results.push({title, label:item.label});
      }
      if(results.length >= 5) break;
    }
  }else{
    const shuffled = shuffle(pool.titles);
    for(const base of shuffled){
      let title = base;
      if(bait) title = makeBaitTitle(title);
      if(!unique.has(title)){
        unique.add(title);
        results.push({title, label:pool.label});
      }
      if(results.length >= 5) break;
    }
  }

  currentTitles = results.map(x=>x.title);
  currentTags = pool.tags.join(" ");
  document.getElementById("heading").textContent = pool.label + " のタイトル候補";
  render(results, currentTags);
}

function render(results, tags){
  const box = document.getElementById("results");
  box.innerHTML = "";
  results.forEach((item, i)=>{
    const div = document.createElement("div");
    div.className = "item";
    const safeTitle = item.title.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    div.innerHTML = `
      <div>
        <div class="titleText">${i+1}. ${item.title}</div>
        <div class="hash">${tags}</div>
      </div>
      <button class="sub smallBtn" onclick="copyText('${safeTitle}\\n${tags}')">コピー</button>
    `;
    box.appendChild(div);
  });
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>alert("コピーしました！")).catch(()=>fallback(text));
  }else fallback(text);
}
function fallback(text){
  const ta=document.createElement("textarea");
  ta.value=text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  alert("コピーしました！");
}
function copyAll(){
  if(!currentTitles.length) generate();
  copyText(currentTitles.map((t,i)=>`${i+1}. ${t}`).join("\\n") + "\\n\\n" + currentTags);
}
function copyPost(){
  if(!currentTitles.length) generate();
  copyText(`配信タイトルメーカーで作ってみた！\\n\\n${currentTitles.slice(0,5).map((t,i)=>`${i+1}. ${t}`).join("\\n")}\\n\\n${currentTags}\\n#ひまつぶし開発室`);
}

generate();
</script>
