    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

    .mainBtn:active{transform:translateY(6px);box-shadow:0 4px 0 #5b21b6,0 10px 18px #8b5cf633;}
    .result{margin-top:18px;background:#fff;border:2px solid var(--line);border-radius:26px;padding:18px;min-height:230px;position:relative;overflow:hidden;}

let current = null;
let usedKeys = new Set();
let lastTitle = '';
function filteredPlans(){
  const cat=document.getElementById('category').value;
  const mood=document.getElementById('mood').value;
  return plans.filter(p=>(cat==='all'||p.c===cat)&&(mood==='all'||p.m===mood));
}
function updateCount(){
  const total=filteredPlans().length;
  document.getElementById('countText').textContent=`該当企画：${total}個 / 全${plans.length}個`;
}
document.getElementById('category').addEventListener('change',()=>{usedKeys.clear();updateCount();});
document.getElementById('mood').addEventListener('change',()=>{usedKeys.clear();updateCount();});
function pickDifferent(arr){
  if(arr.length===0) return null;
  let pool=arr.filter(p=>!usedKeys.has(p.t));
  if(pool.length===0){usedKeys.clear();pool=arr.slice();}
  if(pool.length>1) pool=pool.filter(p=>p.t!==lastTitle);
  const item=pool[Math.floor(Math.random()*pool.length)];
  usedKeys.add(item.t); lastTitle=item.t;
  return item;
}
function generatePlan(){
  const pool=filteredPlans();
  const p=pickDifferent(pool);
  if(!p) return;
  current=p;
  document.getElementById('result').innerHTML=`
    <div class="tagrow"><span class="tag">${categoryNames[p.c]}</span><span class="tag hot">${moodNames[p.m]}</span><span class="tag easy">${p.diff}</span><span class="tag time">準備${p.time}</span></div>
    <div class="title">${p.t}</div>
    <p class="desc">${p.d}</p>
    <div class="memo">${p.memo}</div>`;
}
function resultText(){
  if(!current) return '配信企画メーカーで企画を作ろう！';
  return `今日の配信企画：${current.t}
ジャンル：${categoryNames[current.c]}
雰囲気：${moodNames[current.m]}
${current.d}
${current.memo}`;
}
function copyResult(){
  navigator.clipboard.writeText(resultText()).then(()=>toast('コピーしました'));
}
function shareX(){
  const text=current?`🎲今日の配信企画
「${current.t}」

${current.d}

#配信企画 #配信ネタ #VTuber #ひまつぶし開発室`:'配信企画メーカーで今日の企画を作ってみた！ #配信企画 #配信ネタ';
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400);
}
updateCount();
